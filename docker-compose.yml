services:
  mongodb:
    image: mongo:7
    container_name: hamza-mongodb
    restart: unless-stopped
    # Host port 27018 (27017 is already used by another local MongoDB).
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: hamza
      MONGO_INITDB_ROOT_PASSWORD: hamza_secret_2025
      MONGO_INITDB_DATABASE: hamza-clothing
    volumes:
      - hamza-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Optional web UI for browsing the database at http://localhost:8081
  mongo-express:
    image: mongo-express:1.0.2
    container_name: hamza-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://hamza:hamza_secret_2025@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin

volumes:
  hamza-mongo-data:
